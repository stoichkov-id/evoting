<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Voting Pemilihan Geuchik</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dark: #8a6820;
  --green-deep: #0d3b2e;
  --green-mid: #1a5c42;
  --green-light: #2e8b57;
  --cream: #fef9ef;
  --white: #ffffff;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background-color: var(--green-deep);
  color: var(--white);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(46,139,87,0.1) 0%, transparent 60%);
}

/* ===== BATIK PATTERN HEADER ===== */
.header {
  background: linear-gradient(160deg, #0a2d22 0%, #0f3d2c 60%, #14512e 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 20px),
    repeating-linear-gradient(-45deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 20px);
  pointer-events: none;
}
.header-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 30px 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.header-emblem {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: radial-gradient(circle, #1a5c42, #0a2d22);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(201,168,76,0.3);
}
.header-text { text-align: left; }
.header-text .subtitle {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}
.header-text h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 1px;
  line-height: 1.1;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
.header-text .desa-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
}
.header-nav {
  margin-left: auto;
  display: flex;
  gap: 8px;
}
.nav-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.nav-btn:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); }
.nav-btn.active { background: var(--gold); color: var(--green-deep); font-weight: 700; }

/* ===== MAIN CONTENT ===== */
.main { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

/* ===== STATUS BAR ===== */
.status-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.status-card {
  flex: 1; min-width: 140px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.status-icon { font-size: 22px; }
.status-info .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.status-info .value { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold-light); font-weight: 600; }

/* ===== SECTION TITLE ===== */
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  border-bottom: 1px solid rgba(201,168,76,0.25);
  padding-bottom: 10px;
  margin-bottom: 24px;
}

/* ===== LOGIN PANEL ===== */
.login-panel {
  max-width: 440px;
  margin: 40px auto;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.5s ease;
}
.login-panel .ornament { font-size: 48px; margin-bottom: 16px; }
.login-panel h2 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--gold-light);
  margin-bottom: 6px;
}
.login-panel p {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 28px;
  line-height: 1.6;
}
.input-group { margin-bottom: 16px; text-align: left; }
.input-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7px;
}
.input-group input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.3);
  color: white;
  font-family: 'Lato', sans-serif;
  font-size: 15px;
  padding: 12px 16px;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }
.input-group input::placeholder { color: rgba(255,255,255,0.3); }
.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--green-deep);
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.1); }
.divider span { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

/* ===== ALREADY VOTED ===== */
.voted-notice {
  background: rgba(46,139,87,0.15);
  border: 1px solid rgba(46,139,87,0.4);
  border-radius: 12px;
  padding: 14px 18px;
  margin-top: 14px;
  font-size: 13px;
  color: #6dffb3;
  display: none;
}

/* ===== KANDIDAT CARDS ===== */
.candidates-grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 32px;
}
.candidate-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 28px 20px;
  width: 220px;
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.5s ease both;
}
.candidate-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.candidate-card:hover {
  border-color: var(--gold);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.15);
}
.candidate-card:hover::before { opacity: 1; }

.nomor-urut {
  position: absolute;
  top: 12px; left: 12px;
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--green-deep);
}
.candidate-photo {
  width: 110px; height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(201,168,76,0.4);
  margin-bottom: 14px;
  background: linear-gradient(135deg, #1a5c42, #0a2d22);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
  overflow: hidden;
}
.candidate-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.candidate-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--gold-light);
  margin-bottom: 4px;
  font-weight: 600;
}
.candidate-title {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.vote-bar-wrap { margin-bottom: 14px; }
.vote-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
.vote-bar-track {
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  height: 6px;
  overflow: hidden;
}
.vote-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  border-radius: 20px;
  transition: width 0.8s ease;
}
.btn-vote {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--green-deep);
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-vote:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn-vote:disabled {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.3);
  cursor: not-allowed;
  transform: none;
}

/* ===== CHART AREA ===== */
.chart-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 28px;
}
.chart-section h3 {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 20px;
  text-align: center;
}
#chartCanvas { max-height: 300px; }

/* ===== WINNER BANNER ===== */
.winner-banner {
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 24px 30px;
  text-align: center;
  margin-bottom: 28px;
  display: none;
}
.winner-banner .crown { font-size: 36px; }
.winner-banner h3 {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin: 8px 0 4px;
}
.winner-banner .winner-name {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: var(--gold-light);
  font-weight: 700;
}

/* ===== ADMIN PANEL ===== */
.admin-panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 24px;
  display: none;
}
.admin-section { margin-bottom: 28px; }
.admin-section h3 {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 16px;
}
.voter-list {
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  padding: 10px;
}
.voter-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 13px;
  color: rgba(255,255,255,0.75);
}
.voter-item:last-child { border-bottom: none; }
.voter-item .nik-tag { font-family: monospace; font-size: 12px; color: rgba(255,255,255,0.4); }
.voter-item .voted-for { color: var(--gold); font-size: 12px; }
.btn-danger {
  background: rgba(220,50,50,0.2);
  border: 1px solid rgba(220,50,50,0.5);
  color: #ff8080;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-danger:hover { background: rgba(220,50,50,0.35); }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-right: 8px;
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); }
.candidate-admin-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  margin-bottom: 8px;
}
.candidate-admin-row input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.25);
  color: white;
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 8px;
  outline: none;
}
.candidate-admin-row input:focus { border-color: var(--gold); }
.badge-suara {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: linear-gradient(160deg, #0f3d2c, #0a2d22);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 36px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  animation: scaleIn 0.3s ease;
}
.modal .modal-icon { font-size: 50px; margin-bottom: 14px; }
.modal h3 {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--gold-light);
  margin-bottom: 8px;
}
.modal p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 12px; }
.modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.modal-confirm { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--green-deep); border: none; }
.modal-confirm:hover { filter: brightness(1.1); }
.modal-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }
.modal-cancel:hover { background: rgba(255,255,255,0.08); }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: linear-gradient(135deg, #0f3d2c, #1a5c42);
  border: 1px solid var(--gold);
  color: var(--gold-light);
  font-family: 'Lato', sans-serif;
  font-size: 14px;
  padding: 12px 24px;
  border-radius: 50px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: transform 0.4s cubic-bezier(.17,.67,.47,1.4);
  z-index: 2000;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== RECEIPT ===== */
.receipt-panel {
  max-width: 440px;
  margin: 0 auto 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 36px;
  text-align: center;
  animation: fadeInUp 0.5s ease;
}
.receipt-panel .icon { font-size: 56px; margin-bottom: 14px; }
.receipt-panel h2 {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: #6dffb3;
  margin-bottom: 8px;
}
.receipt-panel p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 6px; }
.receipt-code {
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  padding: 12px 20px;
  font-family: monospace;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 4px;
  margin: 16px 0;
  border: 1px solid rgba(201,168,76,0.2);
}
.receipt-panel .btn-primary { margin-top: 12px; }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.9) } to { opacity:1; transform:scale(1) } }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.4); border-radius: 3px; }

@media(max-width:600px) {
  .header-inner { flex-direction: column; text-align: center; }
  .header-text { text-align: center; }
  .header-nav { margin-left: 0; }
  .status-card { min-width: 120px; }
  .candidate-card { width: 180px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-emblem">🏛️</div>
    <div class="header-text">
      <div class="subtitle">Sistem E-Voting Resmi</div>
      <h1>Pemilihan Geuchik</h1>
      <div class="desa-name" id="desaNameHeader">Desa / Gampong</div>
    </div>
    <div class="header-nav">
      <button class="nav-btn active" id="btnHome" onclick="showSection('voting')">🗳️ Voting</button>
      <button class="nav-btn" id="btnHasil" onclick="showSection('hasil')">📊 Hasil</button>
      <button class="nav-btn" id="btnAdmin" onclick="promptAdmin()">🔐 Admin</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="main" id="mainApp">
  <!-- dynamic content -->
</div>

<!-- MODAL KONFIRMASI VOTE -->
<div class="modal-overlay" id="modalVote">
  <div class="modal">
    <div class="modal-icon">🗳️</div>
    <h3>Konfirmasi Pilihan</h3>
    <p>Anda akan memberikan suara kepada<br><strong id="modalKandidatNama" style="color:var(--gold-light);font-family:'Cinzel',serif;font-size:16px;"></strong><br><br>Pilihan tidak dapat diubah setelah dikonfirmasi.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Batal</button>
      <button class="modal-confirm" onclick="konfirmasiVote()">Ya, Pilih</button>
    </div>
  </div>
</div>

<!-- MODAL ADMIN LOGIN -->
<div class="modal-overlay" id="modalAdmin">
  <div class="modal">
    <div class="modal-icon">🔐</div>
    <h3>Login Admin</h3>
    <p>Masukkan kata sandi admin untuk mengakses panel pengelolaan.</p>
    <div class="input-group" style="text-align:left">
      <label>Kata Sandi</label>
      <input type="password" id="adminPass" placeholder="Masukkan kata sandi" onkeydown="if(event.key==='Enter')cekAdmin()">
    </div>
    <div id="adminErrMsg" style="color:#ff8080;font-size:12px;margin-bottom:10px;display:none;">Kata sandi salah!</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Batal</button>
      <button class="modal-confirm" onclick="cekAdmin()">Masuk</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = JSON.parse(localStorage.getItem('evoting_state') || 'null') || {
  desaNama: 'Gampong Blang Raya',
  tahun: new Date().getFullYear(),
  adminPass: 'admin123',
  statusVoting: true, // true = buka
  kandidat: [
    { id: 1, nama: 'Muhammad Iqbal', jabatan: 'Petani / Tokoh Masyarakat', suara: 0, gambar: 'https://images.pexels.com/photos/1222271/pexels-photo-1222271.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&dpr=1' },
    { id: 2, nama: 'Siti Rahayu', jabatan: 'Wirausahawan / Mantan Sekdes', suara: 0, gambar: 'https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&dpr=1' },
    { id: 3, nama: 'Drs. Harun Ar-Rasyid', jabatan: 'Pendidik / Tokoh Agama', suara: 0, gambar: 'https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&dpr=1' },
  ],
  pemilih: [] // [{nik, votedFor, waktu}]
};

let pendingVoteIndex = null;
let currentSection = 'voting';
let isAdmin = false;
let currentNIK = sessionStorage.getItem('currentNIK') || null;
let chartInstance = null;

function saveState() {
  localStorage.setItem('evoting_state', JSON.stringify(state));
}

function totalSuara() {
  return state.kandidat.reduce((s, k) => s + k.suara, 0);
}

function pemenang() {
  if (totalSuara() === 0) return null;
  return state.kandidat.reduce((a, b) => a.suara > b.suara ? a : b);
}

function persentase(suara) {
  const tot = totalSuara();
  if (tot === 0) return 0;
  return Math.round((suara / tot) * 100);
}

function sudahVote(nik) {
  return state.pemilih.some(p => p.nik === nik);
}

function kodeReceipt() {
  return 'KCK-' + Date.now().toString(36).toUpperCase();
}

// ===== SECTIONS =====
function showSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (sec === 'voting') {
    document.getElementById('btnHome').classList.add('active');
    renderVoting();
  } else if (sec === 'hasil') {
    document.getElementById('btnHasil').classList.add('active');
    renderHasil();
  } else if (sec === 'admin') {
    document.getElementById('btnAdmin').classList.add('active');
    renderAdmin();
  }
}

// ===== RENDER VOTING =====
function renderVoting() {
  const app = document.getElementById('mainApp');
  document.getElementById('desaNameHeader').textContent = state.desaNama + ' — ' + state.tahun;

  if (!state.statusVoting) {
    app.innerHTML = `
      <div class="login-panel">
        <div class="ornament">🔒</div>
        <h2>Pemilihan Ditutup</h2>
        <p>Sesi pemungutan suara saat ini sedang ditutup oleh administrator.<br>Silakan lihat hasil di tab <strong>Hasil</strong>.</p>
      </div>`;
    return;
  }

  if (!currentNIK) {
    renderLogin();
    return;
  }

  if (sudahVote(currentNIK)) {
    const dataPemilih = state.pemilih.find(p => p.nik === currentNIK);
    app.innerHTML = `
      <div class="receipt-panel">
        <div class="icon">✅</div>
        <h2>Suara Tercatat</h2>
        <p>NIK: <strong>${currentNIK}</strong></p>
        <p>Anda telah memberikan suara kepada:</p>
        <p style="color:var(--gold-light);font-family:'Cinzel',serif;font-size:18px;margin:8px 0">${dataPemilih?.votedFor || '-'}</p>
        <p style="font-size:12px;margin-bottom:0">Waktu: ${dataPemilih?.waktu || '-'}</p>
        <div class="receipt-code">${dataPemilih?.kode || '-'}</div>
        <p style="font-size:12px;color:rgba(255,255,255,0.4)">Simpan kode ini sebagai bukti partisipasi Anda</p>
        <button class="btn-primary" onclick="logout()" style="margin-top:16px">Keluar</button>
      </div>
      <div class="chart-section">
        <h3>📊 Hasil Sementara</h3>
        <canvas id="chartCanvas"></canvas>
      </div>
      ${renderWinnerHtml()}`;
    drawChart('chartCanvas');
    renderWinnerEl();
    return;
  }

  let cardsHtml = state.kandidat.map((k, i) => `
    <div class="candidate-card" style="animation-delay:${i * 0.1}s">
      <div class="nomor-urut">${i + 1}</div>
      <div class="candidate-photo" style="margin:0 auto">
        <img src="${k.gambar || 'placeholder.jpg'}" alt="${k.nama}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iNDAiIGN5PSI0MCIgcj0iNDAiIGZpbGw9IiMxYTVjNDIiLz4KPHBhdGggZD0iTTQwIDIwQzQ0LjQxODMgMjAgNDggMjQuNDE4MyA0OCAzMEM0OCA0NC40MTgzIDQ0LjQxODMgNDggNDAgNDhDNDUuNTgxNyA0OCA0MiA0NC40MTgzIDQyIDQwQzQyIDM1LjU4MTcgMzUuNTgxNyAzMiAzMCAzMkMyNC40MTgzIDMyIDIwIDM1LjU4MTcgMjAgNDBDMjAgNDQuNDE4MyAyNC40MTgzIDQ4IDMwIDQ4QzM1LjU4MTcgNDggNDAgNDQuNDE4MyA0MCA0OFoiIGZpbGw9IiNjOWE4NGMiLz4KPHBhdGggZD0iTTMwIDM2QzMyLjIwOTEgMzYgMzQgMzQuMjA5MSAzNCAzNkMzNCA0MS43OTA5IDMyLjIwOTEgNDQgMzAgNDRDMjcuNzkgNDQgMjYgNDEuNzkwOSAyNiAzNkMyNiAzNC4yMDkxIDI3Ljc5IDMzIDMwIDMzWiIgZmlsbD0iIzFhNWM0MiIvPgo8L3N2Zz4=';">
      </div>
      <div class="candidate-name" style="margin-top:12px">${k.nama}</div>
      <div class="candidate-title">${k.jabatan}</div>
      <p style="font-size:10px;color:#777;margin-top:5px;">Foto dari <a href="https://www.pexels.com/search/candidate/" target="_blank" style="color:#c9a84c;text-decoration:none;">Pexels</a></p>
      <div class="vote-bar-wrap">
        <div class="vote-bar-label">
          <span>${k.suara} suara</span>
          <span>${persentase(k.suara)}%</span>
        </div>
        <div class="vote-bar-track">
          <div class="vote-bar-fill" style="width:${persentase(k.suara)}%"></div>
        </div>
      </div>
      <button class="btn-vote" onclick="pilihKandidat(${i})">✔ Pilih Kandidat Ini</button>
    </div>`).join('');

  app.innerHTML = `
    ${renderStatusBar()}
    <div class="section-title">Kandidat Keuchik</div>
    <div class="candidates-grid">${cardsHtml}</div>
    <div class="chart-section">
      <h3>📊 Grafik Perolehan Suara</h3>
      <canvas id="chartCanvas"></canvas>
    </div>
    ${renderWinnerHtml()}
    <div style="text-align:center;padding:10px 0 30px">
      <button class="btn-secondary" onclick="logout()">🚪 Logout (NIK: ${currentNIK})</button>
    </div>`;
  drawChart('chartCanvas');
  renderWinnerEl();
}

function renderLogin() {
  const app = document.getElementById('mainApp');
  app.innerHTML = `
    ${renderStatusBar()}
    <div class="login-panel">
      <div class="ornament">🗳️</div>
      <h2>Masuk untuk Memilih</h2>
      <p>Gunakan NIK (Nomor Induk Kependudukan) Anda yang terdaftar sebagai warga ${state.desaNama} untuk masuk ke sistem e-voting.</p>
      <div class="input-group">
        <label>Nomor NIK</label>
        <input type="text" id="nikInput" placeholder="Contoh: 1102XXXXXX" maxlength="16" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="namaInput" placeholder="Masukkan nama Anda" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">MASUK & PILIH</button>
      <div class="divider"><span>INFO</span></div>
      <p style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.7">Setiap NIK hanya dapat digunakan sekali. Data Anda dijaga kerahasiaannya sesuai UU Pemilu.</p>
    </div>`;
}

function renderStatusBar() {
  const tot = totalSuara();
  const wkt = state.kandidat.length;
  const open = state.statusVoting ? '🟢 Buka' : '🔴 Tutup';
  return `
    <div class="status-bar">
      <div class="status-card"><div class="status-icon">🏘️</div><div class="status-info"><div class="label">Desa</div><div class="value" style="font-size:14px;margin-top:2px">${state.desaNama}</div></div></div>
      <div class="status-card"><div class="status-icon">👥</div><div class="status-info"><div class="label">Total Pemilih</div><div class="value">${tot}</div></div></div>
      <div class="status-card"><div class="status-icon">🎖️</div><div class="status-info"><div class="label">Kandidat</div><div class="value">${wkt}</div></div></div>
      <div class="status-card"><div class="status-icon">📋</div><div class="status-info"><div class="label">Status</div><div class="value" style="font-size:14px;margin-top:2px">${open}</div></div></div>
    </div>`;
}

function renderWinnerHtml() {
  return `<div class="winner-banner" id="winnerBanner"></div>`;
}

function renderWinnerEl() {
  const p = pemenang();
  const el = document.getElementById('winnerBanner');
  if (!el) return;
  if (p && totalSuara() > 0) {
    el.style.display = 'block';
    el.innerHTML = `
      <div class="crown">👑</div>
      <h3>Unggul Sementara</h3>
      <div class="winner-name">${p.nama}</div>
      <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:6px">${p.suara} suara · ${persentase(p.suara)}% dari total</div>`;
  }
}

// ===== RENDER HASIL =====
function renderHasil() {
  const app = document.getElementById('mainApp');
  const tot = totalSuara();
  let rows = state.kandidat
    .slice().sort((a, b) => b.suara - a.suara)
    .map((k, rank) => `
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,${rank===0?'0.5':'0.15'});border-radius:14px;padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;gap:16px;animation:fadeInUp 0.4s ease both;animation-delay:${rank*0.1}s">
        <div style="font-size:28px">${rank===0&&tot>0?'🥇':rank===1?'🥈':'🥉'}</div>
        <div style="flex:1">
          <div style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold-light)">${k.nama}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.45);margin:3px 0 10px">${k.jabatan}</div>
          <div style="background:rgba(255,255,255,0.06);border-radius:20px;height:8px;overflow:hidden">
            <div style="height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-light));border-radius:20px;width:${persentase(k.suara)}%;transition:width 1s ease"></div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Cinzel',serif;font-size:26px;color:${rank===0&&tot>0?'var(--gold-light)':'white'}">${k.suara}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.45)">${persentase(k.suara)}%</div>
        </div>
      </div>`).join('');

  app.innerHTML = `
    ${renderStatusBar()}
    <div class="section-title">Rekap Suara</div>
    ${rows}
    <div class="chart-section" style="margin-top:20px">
      <h3>📊 Grafik Distribusi Suara</h3>
      <canvas id="chartCanvas"></canvas>
    </div>
    ${renderWinnerHtml()}
    <div style="text-align:center;margin:20px 0 30px">
      <button class="btn-secondary" onclick="cetakHasil()">🖨️ Cetak Hasil</button>
    </div>`;
  drawChart('chartCanvas');
  renderWinnerEl();
}

// ===== RENDER ADMIN =====
function renderAdmin() {
  const app = document.getElementById('mainApp');
  let kandidatRows = state.kandidat.map((k, i) => `
    <div class="candidate-admin-row">
      <span style="color:var(--gold);font-family:'Cinzel',serif;min-width:24px">${i+1}</span>
      <input value="${k.nama}" onchange="state.kandidat[${i}].nama=this.value;saveState()" placeholder="Nama kandidat">
      <input value="${k.jabatan}" onchange="state.kandidat[${i}].jabatan=this.value;saveState()" placeholder="Jabatan/keterangan" style="flex:1.2">
      <input value="${k.gambar || ''}" onchange="state.kandidat[${i}].gambar=this.value;saveState()" placeholder="URL gambar" style="flex:1">
      <span class="badge-suara">${k.suara} suara</span>
      <button class="btn-danger" onclick="hapusKandidat(${i})" style="padding:6px 10px">✕</button>
    </div>`).join('');

  let pemilihRows = state.pemilih.length === 0
    ? `<div style="color:rgba(255,255,255,0.3);font-size:13px;padding:16px;text-align:center">Belum ada yang memilih</div>`
    : state.pemilih.map((p, i) => `
        <div class="voter-item">
          <span style="color:rgba(255,255,255,0.5);margin-right:8px">${i+1}.</span>
          <span>${p.nama||'—'}</span>
          <span class="nik-tag">${p.nik}</span>
          <span class="voted-for">→ ${p.votedFor}</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.3)">${p.waktu}</span>
        </div>`).join('');

  app.innerHTML = `
    <div class="admin-panel" style="display:block">
      <div class="admin-section">
        <h3>⚙️ Pengaturan Umum</h3>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <div class="input-group" style="flex:1;min-width:200px">
            <label>Nama Desa / Gampong</label>
            <input type="text" value="${state.desaNama}" onchange="state.desaNama=this.value;saveState();document.getElementById('desaNameHeader').textContent=state.desaNama+' — '+state.tahun">
          </div>
          <div class="input-group" style="flex:0 0 120px">
            <label>Tahun</label>
            <input type="number" value="${state.tahun}" onchange="state.tahun=this.value;saveState()">
          </div>
          <div class="input-group" style="flex:0 0 180px">
            <label>Kata Sandi Admin</label>
            <input type="password" value="${state.adminPass}" onchange="state.adminPass=this.value;saveState()">
          </div>
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <button class="${state.statusVoting?'btn-danger':'btn-primary'}" style="padding:10px 20px;font-size:13px" onclick="toggleVoting()">
            ${state.statusVoting?'🔒 Tutup Pemilihan':'🔓 Buka Pemilihan'}
          </button>
          <button class="btn-secondary" onclick="konfirmasiReset()">🔄 Reset Semua Suara</button>
          <button class="btn-secondary" onclick="exportData()">📥 Export Data</button>
          <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📤 Import Data</button>
          <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
          <span style="font-size:12px;color:rgba(255,255,255,0.35)">Total pemilih: ${state.pemilih.length}</span>
        </div>
      </div>

      <div class="admin-section">
        <h3>🎖️ Kelola Kandidat</h3>
        <div id="kandidatAdminList">${kandidatRows}</div>
        <button class="btn-secondary" style="margin-top:10px" onclick="tambahKandidat()">+ Tambah Kandidat</button>
      </div>

      <div class="admin-section">
        <h3>📋 Daftar Pemilih (${state.pemilih.length} orang)</h3>
        <div class="voter-list">${pemilihRows}</div>
      </div>

      <div style="text-align:right;margin-top:16px">
        <button class="nav-btn" onclick="isAdmin=false;showSection('voting')">← Kembali ke Voting</button>
      </div>
    </div>`;
}

// ===== ACTIONS =====
function doLogin() {
  const nik = document.getElementById('nikInput')?.value?.trim();
  if (!nik || nik.length < 4) { showToast('⚠️ NIK tidak valid'); return; }
  currentNIK = nik;
  sessionStorage.setItem('currentNIK', nik);
  renderVoting();
}

function logout() {
  currentNIK = null;
  sessionStorage.removeItem('currentNIK');
  renderVoting();
}

function pilihKandidat(index) {
  pendingVoteIndex = index;
  document.getElementById('modalKandidatNama').textContent = state.kandidat[index].nama;
  document.getElementById('modalVote').classList.add('active');
}

function konfirmasiVote() {
  if (pendingVoteIndex === null) return;
  const k = state.kandidat[pendingVoteIndex];
  const nama = document.getElementById('namaInput')?.value?.trim() || '';
  k.suara++;
  const kode = kodeReceipt();
  const waktu = new Date().toLocaleString('id-ID');
  state.pemilih.push({ nik: currentNIK, nama, votedFor: k.nama, waktu, kode });
  saveState();
  closeModal();
  pendingVoteIndex = null;
  showToast('✅ Suara berhasil dicatat!');
  setTimeout(() => renderVoting(), 800);
}

function toggleVoting() {
  state.statusVoting = !state.statusVoting;
  saveState();
  showToast(state.statusVoting ? '🔓 Pemilihan dibuka' : '🔒 Pemilihan ditutup');
  renderAdmin();
}

function tambahKandidat() {
  const id = Date.now();
  state.kandidat.push({ id, nama: 'Kandidat Baru', jabatan: 'Tokoh Masyarakat', suara: 0, gambar: 'placeholder.jpg' });
  saveState();
  renderAdmin();
}

function hapusKandidat(i) {
  if (state.kandidat.length <= 2) { showToast('⚠️ Minimal 2 kandidat'); return; }
  state.kandidat.splice(i, 1);
  saveState();
  renderAdmin();
}

function konfirmasiReset() {
  if (confirm('Reset semua suara dan data pemilih? Tindakan ini tidak dapat dibatalkan.')) {
    state.kandidat.forEach(k => k.suara = 0);
    state.pemilih = [];
    saveState();
    showToast('🔄 Data berhasil direset');
    renderAdmin();
  }
}

function cetakHasil() {
  window.print();
}

// ===== ADMIN AUTH =====
function promptAdmin() {
  if (isAdmin) { showSection('admin'); return; }
  document.getElementById('adminPass').value = '';
  document.getElementById('adminErrMsg').style.display = 'none';
  document.getElementById('modalAdmin').classList.add('active');
}

function cekAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === state.adminPass) {
    isAdmin = true;
    closeModal();
    showSection('admin');
  } else {
    document.getElementById('adminErrMsg').style.display = 'block';
  }
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
}

// ===== CHART =====
function drawChart(canvasId) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const colors = [
    { bg: 'rgba(201,168,76,0.8)', border: '#f0d080' },
    { bg: 'rgba(46,139,87,0.8)', border: '#6dffb3' },
    { bg: 'rgba(100,180,255,0.8)', border: '#a8d8ff' },
    { bg: 'rgba(255,150,80,0.8)', border: '#ffd0a8' },
  ];

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: state.kandidat.map(k => k.nama),
      datasets: [{
        data: state.kandidat.map(k => k.suara),
        backgroundColor: state.kandidat.map((_, i) => colors[i % colors.length].bg),
        borderColor: state.kandidat.map((_, i) => colors[i % colors.length].border),
        borderWidth: 2,
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} suara (${persentase(ctx.parsed.y)}%)`
          }
        }
      },
      scales: {
        x: { ticks: { color: 'rgba(255,255,255,0.7)', font: { family: 'Cinzel', size: 12 } }, grid: { display: false } },
        y: { ticks: { color: 'rgba(255,255,255,0.5)', stepSize: 1, font: { size: 11 } }, beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' } }
      },
      animation: { duration: 800, easing: 'easeInOutQuart' }
    }
  });
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== CLOSE MODAL ON OVERLAY CLICK =====
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(); });
});

// ===== EXPORT/IMPORT =====
function exportData() {
  const dataStr = JSON.stringify(state, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', 'evoting-data.json');
  linkElement.click();
  showToast('📥 Data diekspor ke file');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedState = JSON.parse(e.target.result);
      if (confirm('Import data akan mengganti semua data saat ini. Lanjutkan?')) {
        state = importedState;
        saveState();
        showToast('✅ Data berhasil diimpor');
        renderAdmin();
      }
    } catch (err) {
      showToast('❌ File tidak valid');
    }
  };
  reader.readAsText(file);
}

// ===== INIT =====
document.getElementById('desaNameHeader').textContent = state.desaNama + ' — ' + state.tahun;
showSection('voting');
</script>
</body>
</html>
